
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-service-sa
  namespace: generator-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-service-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "namespaces", "nodes", "events"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-service-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-service-role
subjects:
- kind: ServiceAccount
  name: cluster-service-sa
  namespace: generator-platform
