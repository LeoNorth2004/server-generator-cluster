
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-service
  namespace: generator-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-service
  template:
    metadata:
      labels:
        app: cluster-service
    spec:
      serviceAccountName: cluster-service-sa
      containers:
        - name: cluster-service
          image: generator-platform/cluster-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          env:
            - name: CLUSTER_SERVICE_PORT
              value: "8086"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "123456"
            - name: DB_NAME
              value: "generator_platform"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: KUBERNETES_NAMESPACE
              value: "generator-platform"

---

apiVersion: v1
kind: Service
metadata:
  name: cluster-service
  namespace: generator-platform
spec:
  selector:
    app: cluster-service
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 8086
